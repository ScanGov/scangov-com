<div class="row g-3">
  {% for item in standards_list %}
    <div class="col-12 col-sm-12 col-md-6 {% if standards_list_type != "guidance" %}col-lg-4 col-xl-4{% endif %} d-flex align-items-stretch">
      <div class="card">
        <p class="m-0 p-0">
          {% if item.title %}
            {% set name = item.title %}
          {% else %}
            {% set name = item.displayName %}
          {% endif %}
          <a class="nav-link px-4 py-3" href="https://standards.scangov.org{% if standards_list_type == "guidance" %}{{ item.url }}{% else %}/{{ item.key }}{% endif %}/">
            <i class="fa-solid fa-{% if standards_list_type == "guidance" %}scroll{% else %}certificate{% endif %}" aria-hidden="true"></i>
            {{ name }}
          </a>
        </p>
      </div>
    </div>
  {% endfor %}
</div>
