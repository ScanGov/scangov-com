<div class="container mt-4">
  <div class="row g-4">
    {% for item in who %}
      <div class="col-12 col-md-6 col-lg-4 d-flex align-items-stretch">
        <div class="card p-4 w-100 text-center d-flex flex-column align-items-center">
          <i class="fa-solid {{ item.icon }} fa-3x mt-2 mb-3" aria-hidden="true"></i>
          <h2 class="h5 mt-2 mb-2">{{ item.title }}</h2>
          <p class="small text-body-secondary mb-0">{{ item.description }}</p>
          <p class="small border-top w-100 pt-3 mt-3 mb-0">{{ item.detail }}</p>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
