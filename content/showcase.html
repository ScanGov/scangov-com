<div class="container">
  <div class="row">
    <div class="card-group">
      {% for item in showcase %}
        <div class="col-12 col-sm-12 col-md-4 col-lg-4 col-xl-4 d-flex align-items-stretch">
          <div class="card mx-2 my-2 pt-2">
            <div class="card-body">
              <i class="fa-solid fa-star fa-lg d-block mb-2" aria-hidden="true"></i>
              <h2 class="h4 mb-2 mt-3">
                <a href="{{ item.url }}" class="stretched-link" target="_blank" rel="noopener">{{ item.title }}</a>
              </h2>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
